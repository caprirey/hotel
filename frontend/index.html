<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ganancias - Hotel</title>
    <link rel="stylesheet" href="style.css?v=7">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
        <h1 style="cursor: pointer;" onclick="window.location.reload()">Hotel Tracker</h1>
        <div style="flex: 1; display: flex; justify-content: center;">
            <button onclick="window.location.href='/analytics.html'" class="btn-submit" style="width:auto; margin:0; padding: 0.5rem 1.2rem; background: rgba(88, 166, 255, 0.1); color: #58a6ff; border: 1px solid #58a6ff;">📊 Ver Estadísticas</button>
        </div>
        <div class="date-navigator">
                <button id="prev-day" class="nav-btn" onclick="changeDate(-1)">&lt;</button>
                <span id="current-date-display" class="date-display">...</span>
                <button id="next-day" class="nav-btn" onclick="changeDate(1)">&gt;</button>
            </div>
        </header>
        <main id="app-content">
            <!-- Content will be injected here -->
        </main>
    </div>
    
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
    <div id="history-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Historial Habit.</h2>
            <button class="close-btn" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="sidebar-content" id="sidebar-content">
            <!-- Details will be injected here -->
        </div>
    </div>
    <script src="script.js?v=8"></script>
</body>
</html>
